services:
  db:
    image: postgres:16.11
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD: postgres

  web:
    build:
      context: .
      dockerfile: Dockerfile.dev # ここでファイルを指定！
    # --- 起動時に古いPIDファイルを消してから bin/dev を実行する ---
    command: ./bin/dev
    # ---------------------------------------------
    volumes:
      - .:/rails
    ports:
      - "3000:3000"
# docker-compose.yml の environment セクションを以下に更新
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/habitflow_development
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GROQ_API_KEY: ${GROQ_API_KEY}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      LINE_CHANNEL_ID: ${LINE_CHANNEL_ID}
      LINE_CHANNEL_SECRET: ${LINE_CHANNEL_SECRET}
      LINE_CHANNEL_ACCESS_TOKEN: ${LINE_CHANNEL_ACCESS_TOKEN}
    depends_on:
      - db
    stdin_open: true
    tty: true

volumes:
  postgres_data: