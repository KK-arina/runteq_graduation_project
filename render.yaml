## 作業の全体フロー まとめ
```
【Issue #36 作業フロー】

1. git checkout -b feature/issue-36-production-deploy

2. db/seeds.rb を修正（環境変数フラグ方式のガードに変更）

3. render.yaml を修正（startCommand を追加）

4. ローカルでテスト
   → bin/rails test（全202テストがパス）
   → bin/rails db:seed（ローカルで正常動作確認）
   → RAILS_ENV=production bin/rails db:seed（ガードでabortされること確認）

5. コミット → プッシュ → PR → main にマージ

6. Render が自動デプロイ（約3〜5分待つ）
   → デプロイログに「bin/rails db:migrate」の実行ログが出ること確認

7. Render Shell で SEED_IN_PRODUCTION=true bin/rails db:seed

8. 本番URLで全機能動作確認チェックリストを実施

9. Issue #36 をクローズ