## Step 5: 本番 seeds 実行手順

デプロイ完了後、Render の Shell から実行します。
```
【Render Shell でのデモデータ投入手順】

1. Render ダッシュボード → habitflow-web → 「Shell」タブを開く
2. 以下のコマンドを実行する:

   SEED_IN_PRODUCTION=true bin/rails db:seed

3. 出力を確認する（✓ マークが並んで正常終了すること）

4. 最後に以下が表示されれば成功:
   ✅ Seeds 実行完了！
   🔑 ログイン情報:
   メールアドレス: test@example.com
   パスワード:     password
```

---

## Step 6: 本番環境での全機能動作確認チェックリスト

本番URL（https://habitflow-web.onrender.com）で以下を確認します：
```
【本番環境 動作確認チェックリスト】

■ 未ログイン状態
  □ ランディングページ（/）が正常に表示される
  □ CSS・画像が正しく読み込まれている
  □ 「ログイン」「今すぐ始める」ボタンが表示される

■ 認証機能
  □ 新規ユーザー登録ができる
  □ ログインができる（test@example.com / password）
  □ ログアウトができる
  □ 未ログイン時にダッシュボードへアクセスするとログイン画面にリダイレクトされる

■ ダッシュボード（/dashboard）
  □ 今週の達成率プログレスバーが表示される
  □ 今日の習慣チェックリストが表示される
  □ チェックボックスをクリックすると即時保存される（ページリロード不要）
  □ ロック警告バナーが表示される（月曜AM4:00以降）

■ 習慣管理（/habits）
  □ 6個の習慣が一覧表示される（論理削除済みの1個は非表示）
  □ 今週の進捗率プログレスバーが表示される
  □ ロック中は「新しい習慣を追加」ボタンが非活性

■ 週次振り返り（/weekly_reflections）
  □ 過去2件の完了済み振り返りが一覧表示される
  □ 詳細ページが正常に表示される
  □ 先週の振り返り入力フォームが開ける
  □ 振り返りを完了するとロックが解除される

■ セキュリティ
  □ HTTP でアクセスすると HTTPS にリダイレクトされる
  □ 他のユーザーの習慣にアクセスしようとすると 404 になる

■ エラーハンドリング
  □ 存在しない URL（/hogehoge）にアクセスすると 404 ページが表示される
```

