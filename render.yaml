# ==============================================================================
# render.yaml - インフラ構成定義ファイル（G-1 更新）
# ==============================================================================
#
# 【構成】
#   Web サービスのみ使用する。
#   GoodJob は execution_mode: :async で Web プロセス内で実行するため
#   Worker サービスは不要。
#   Render の Free プランは Background Worker が使えないため（最低$7/月）
#   この構成を採用している。
#
services:
  - type: web
    name: habitflow-web
    runtime: docker
    region: singapore
    plan: free
    branch: main
    dockerfilePath: ./Dockerfile
    dockerContext: .

    buildCommand: |
      bundle install
      bundle exec rails assets:precompile
      bundle exec rails assets:clean

    startCommand: bundle exec rails db:migrate && exec bundle exec puma -C config/puma.rb

    envVars:
      - key: RAILS_ENV
        value: production

      - key: RAILS_MASTER_KEY
        sync: false

      - key: DATABASE_URL
        sync: false

      - key: RAILS_LOG_TO_STDOUT
        value: "true"

      - key: RAILS_SERVE_STATIC_FILES
        value: "true"

      - key: WEB_CONCURRENCY
        value: "2"

      # Resend メール送信サービス API キー
      # Render ダッシュボードから手動で設定する
      - key: RESEND_API_KEY
        sync: false

      # ============================================================
      # G-1 追加: LINE Messaging API チャネルアクセストークン
      # ============================================================
      #
      # 【LINE_CHANNEL_ACCESS_TOKEN とは何か】
      #   LINE Messaging API チャネルで発行する「チャネルアクセストークン」。
      #   LINE Developers Console → Messaging API チャネル →
      #   「Messaging API設定」タブ → 「チャネルアクセストークン（長期）」で取得する。
      #
      # 【sync: false の意味】
      #   実際のトークン値は Render ダッシュボードから手動で設定する。
      #   GitHub に秘密情報を上げないためこの形式を使う。
      - key: LINE_CHANNEL_ACCESS_TOKEN
        sync: false

      # ============================================================
      # I-5 追加: Sentry エラー監視用 DSN
      # ============================================================
      #
      # 【SENTRY_DSN とは】
      #   Sentry プロジェクトの送信先URL。Sentry管理画面で発行される。
      #   これが本番に設定されているときだけ Sentry が有効になる
      #   （config/initializers/sentry.rb が if ENV["SENTRY_DSN"].present? で判定）。
      #
      # 【sync: false の意味】
      #   実際の値は Render ダッシュボードから手動で設定する（GitHubに秘密情報を上げない）。
      #
      # 【Release Tracking について】
      #   デプロイのコミットSHAは Render が RENDER_GIT_COMMIT 環境変数として
      #   自動提供するため、ここに追記する必要はない。
      #   sentry.rb 側で config.release = ENV["RENDER_GIT_COMMIT"] として読み込む。
      - key: SENTRY_DSN
        sync: false