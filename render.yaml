# ==============================================================================
# render.yaml - インフラ構成定義ファイル（Infrastructure as Code）
# ==============================================================================
#
# 【このファイルの役割】
# Render.com がアプリをどのように起動・デプロイするかをコードで定義するファイル。
# このファイルを Git で管理することで「インフラの設定をコードとして記録・再現」
# できる（Infrastructure as Code / IaC と呼ぶ）。
# main ブランチへの push が自動デプロイのトリガーになる。
#
# 【採用構成の理由】
# Render 内蔵 PostgreSQL（free プラン）は「作成から90日で自動削除」される。
# ポートフォリオは長期運用が前提のため、以下の永続無料構成を採用する:
#   Web サービス  → Render（無料 Web Service）
#   データベース  → Neon Serverless Postgres（永続無料）
#
# 【render.yaml の適用タイミング】
# Render のダッシュボードから「New Blueprint」を選択すると、
# このファイルが自動で読み込まれてサービスが作成される。
#
# 【参考ドキュメント】
# https://render.com/docs/infrastructure-as-code
# ==============================================================================

services:
  # ============================================================================
  # [1] Web サービス（Rails アプリ本体）
  # ============================================================================
  - type: web
    name: habitflow-web
    runtime: docker
    region: singapore
    plan: free
    branch: main
    dockerfilePath: ./Dockerfile
    dockerContext: .

    buildCommand: |
      bundle install
      bundle exec rails assets:precompile
      bundle exec rails assets:clean

    startCommand: bundle exec rails db:migrate && exec bundle exec puma -C config/puma.rb

    envVars:
      - key: RAILS_ENV
        value: production

      - key: RAILS_MASTER_KEY
        sync: false

      - key: DATABASE_URL
        sync: false

      - key: RAILS_LOG_TO_STDOUT
        value: "true"

      - key: RAILS_SERVE_STATIC_FILES
        value: "true"

      - key: WEB_CONCURRENCY
        value: "2"

      # ============================================================
      # Issue #A-4: Resend APIキー
      # ============================================================
      #
      # 【sync: false の意味】
      # sync: false を指定すると render.yaml にはキー名だけが記録され、
      # 実際の値はRenderダッシュボードから手動で設定する。
      #
      # 【なぜ値をrender.yamlに直書きしないのか】
      # render.yaml は GitHub で管理されるため、
      # APIキーの値を直書きすると公開リポジトリで漏洩する。
      # sync: false にして値をダッシュボード側で管理するのがベストプラクティス。
      - key: RESEND_API_KEY
        sync: false

  # ============================================================================
  # [2] Worker サービス（GoodJob 非同期処理）
  # ============================================================================
  #
  # 【Issue #A-3: GoodJob 導入完了によりコメントアウトを解除】
  #
  # 【Worker と Web の役割分担】
  # Web サービス:    HTTP リクエストを受け付けてレスポンスを返す（ユーザー向け）
  # Worker サービス: good_jobs テーブルを監視してジョブを順番に処理する（バックグラウンド）
  #
  # 【Render 無料プランでの Worker の制約】
  # - 15 分間処理がないとスリープする
  # - スリープ中にジョブが積まれると Worker が起動してから実行される（遅延あり）
  # - ポートフォリオ・卒業制作用途では許容範囲
  - type: worker
    name: habitflow-worker
    runtime: docker
    region: singapore
    plan: free
    branch: main
    dockerfilePath: ./Dockerfile
    dockerContext: .

    # --------------------------------------------------------------------------
    # startCommand: Worker 起動コマンド
    # --------------------------------------------------------------------------
    #
    # bundle exec good_job start:
    #   GoodJob の Worker プロセスを起動するコマンド。
    #   このプロセスは常時起動して good_jobs テーブルを監視し、
    #   新しいジョブが積まれると自動で実行する。
    #
    # ⚠️ --max-threads=3 を必ず明示する理由（重要）
    # -------------------------------------------------------
    # GoodJob の max_threads のデフォルト値は 5 である。
    # config/initializers/good_job.rb で max_threads = 3 を設定しているが、
    # これは Rails アプリが読み込まれた後の設定であり、
    # コマンドライン引数はそれよりも優先度が高い。
    #
    # もし --max-threads を指定しないと以下が起きる可能性がある:
    #   - Worker がデフォルトの 5 スレッドで動作する
    #   - DB コネクション数が: Web(6) + Worker(5) = 11 コネクション
    #   - Neon 無料プランの上限（10〜20）をギリギリ超えるリスク
    #   - 「PG::ConnectionBad: connection is closed」エラーで本番障害
    #
    # --max-threads=3 を明示することで:
    #   - Web(6) + Worker(3) = 9 コネクション → Neon 上限以内で安全
    #   - initializer の設定と一致するため意図した動作になる
    #
    # 【コネクション数の内訳】
    # Web サービス: Puma Worker(2) × Thread(3) = 最大 6 コネクション
    # GoodJob Worker: 3 スレッド × 1 コネクション = 最大 3 コネクション
    # 合計: 9 コネクション（Neon 無料プランの上限 10〜20 以内）
    startCommand: bundle exec good_job start --max-threads=3

    envVars:
      # Worker も本番 DB（Neon）に接続してジョブを実行するため必要
      - key: RAILS_ENV
        value: production

      - key: DATABASE_URL
        sync: false

      - key: RAILS_MASTER_KEY
        sync: false

      - key: RAILS_LOG_TO_STDOUT
        value: "true"

      # ============================================================
      # Issue #A-4: Worker側にもRESEND_API_KEYが必要な理由
      # ============================================================
      #
      # GoodJobのWorkerは将来的にメール送信ジョブ（週次レポートなど）を
      # 非同期で処理する。
      # WorkerはWebとは別プロセスのため、独自に環境変数が必要。
      - key: RESEND_API_KEY
        sync: false