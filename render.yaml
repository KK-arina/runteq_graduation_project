# ==============================================================================
# render.yaml
# ==============================================================================
#
# 【このファイルの役割】
# Render.com がアプリケーションをどのように起動・デプロイするかを定義します。
# render.yaml を Git リポジトリに含めることで「コードとしてインフラを管理」
# （Infrastructure as Code）できます。
# mainブランチへのpushが自動デプロイのトリガーになります。
#
# 【参考ドキュメント】
# https://render.com/docs/infrastructure-as-code
# ==============================================================================

# ==============================================================================
# データベースの定義
# ==============================================================================
databases:
  - name: habitflow-db
    # plan: 料金プラン
    # free = 無料プラン（90日間でDBが自動削除される制限あり）
    # 講師レビュー期間中は free で問題ないが、長期運用する場合は有料プランを検討
    plan: free
    # region: データベースを配置するリージョン（地域）
    # oregon = アメリカ西海岸（オレゴン州）
    # Webサービスと同じリージョンにすることで通信遅延を最小化できる
    region: oregon

# ==============================================================================
# Webサービスの定義
# ==============================================================================
services:
  - type: web
    # name: Render ダッシュボード上で表示されるサービス名
    name: habitflow-web
    # runtime: 実行環境
    # docker を指定すると、リポジトリ内の Dockerfile を使ってコンテナをビルドする
    runtime: docker
    # region: Webサービスを配置するリージョン
    # データベースと同じ oregon を指定（同リージョン間の通信は高速）
    region: oregon
    # plan: 料金プラン（free = 無料プラン）
    plan: free
    # branch: デプロイ対象の Git ブランチ
    # main ブランチへの push が自動デプロイのトリガーになる
    branch: main
    # dockerfilePath: 使用する Dockerfile のパス
    # 本番用の Dockerfile（マルチステージビルド対応）を指定
    dockerfilePath: ./Dockerfile
    # dockerContext: Docker ビルドのコンテキスト（プロジェクトルート）
    dockerContext: .

    # ──────────────────────────────────────────────────────────────
    # startCommand: コンテナ起動時に実行するコマンド
    # ──────────────────────────────────────────────────────────────
    #
    # 【なぜ startCommand が必要なのか】
    # Dockerfile の CMD に "rails server" だけを書くと、
    # デプロイのたびにマイグレーションが自動実行されない。
    # startCommand でマイグレーション → サーバー起動の順番を明示することで、
    # 「コードと DB スキーマの整合性」を毎回のデプロイで保証できる。
    #
    # 【startCommand は Dockerfile の CMD を上書きする】
    # Docker の仕組み上、render.yaml の startCommand は
    # Dockerfile の CMD より優先される。
    # Dockerfile の ENTRYPOINT（docker-entrypoint）は引き続き実行される。
    #
    # 【コマンドの解説】
    #
    # bin/rails db:migrate
    #   未実行のマイグレーションファイルを本番 DB に適用する。
    #   schema_migrations テーブルで実行済みかどうかを管理しており、
    #   適用済みのものはスキップされるため、何度実行しても安全（冪等性あり）。
    #
    # &&
    #   前のコマンドが成功（終了コード 0）した場合のみ次を実行する演算子。
    #   マイグレーション失敗時にサーバーが起動しないようにする安全弁。
    #   もしマイグレーションでエラーが起きたら、ここで処理が止まり
    #   Render がデプロイ失敗として通知してくれる。
    #
    # exec bin/rails server -b 0.0.0.0
    #   exec とは：現在のシェルプロセスを Rails プロセスで「置き換える」コマンド。
    #
    #   exec を使わない場合の問題：
    #     シェル（PID 1）→ Rails（PID 2）という親子関係になる。
    #     Render が停止シグナル（SIGTERM）を送ると PID 1 のシェルに届くが、
    #     シェルは Rails に転送しないため Rails が強制終了（SIGKILL）される。
    #     その結果、処理中のリクエストが中断される（Graceful Shutdown 不可）。
    #
    #   exec を使った場合：
    #     シェルが Rails プロセスに置き換わり、Rails が PID 1 になる。
    #     Render の SIGTERM が直接 Rails に届くため正常に終了処理ができる
    #     （Graceful Shutdown 可能）。
    #
    #   -b 0.0.0.0
    #     すべてのネットワークインターフェースでリクエストを受け付ける設定。
    #     これがないと Render のロードバランサーからアクセスできない
    #     （デフォルトの localhost では外部からの接続が拒否されてしまう）。
    startCommand: bin/rails db:migrate && exec bin/rails server -b 0.0.0.0

    # ──────────────────────────────────────────────────────────────
    # 環境変数の設定
    # ──────────────────────────────────────────────────────────────
    envVars:
      # RAILS_ENV: Rails の実行環境
      # production = 本番環境（キャッシュ有効・デバッグ無効・最適化 ON）
      - key: RAILS_ENV
        value: production

      # RAILS_MASTER_KEY: config/credentials.yml.enc を復号するためのキー
      # このキーがないと暗号化された設定ファイルが読めずアプリが起動しない。
      # sync: false → Git にはコミットせず、Render ダッシュボードから手動で設定する。
      # 【設定場所】Render ダッシュボード → habitflow-web → Environment →
      #             Add Environment Variable → key: RAILS_MASTER_KEY
      # 【値の確認】ローカルの config/master.key ファイルの中身をコピーする
      - key: RAILS_MASTER_KEY
        sync: false

      # DATABASE_URL: PostgreSQL の接続 URL
      # fromDatabase を使うと上で定義した habitflow-db の接続情報を自動取得する。
      # property: connectionString → "postgresql://user:pass@host:port/dbname" 形式で取得
      # これにより config/database.yml の `url: ENV['DATABASE_URL']` が機能する。
      - key: DATABASE_URL
        fromDatabase:
          name: habitflow-db
          property: connectionString

      # RAILS_LOG_TO_STDOUT: ログを標準出力（STDOUT）に出力する設定
      # Render はコンテナの標準出力を自動収集してダッシュボードに表示する。
      # ファイルに書くとコンテナ再起動でログが消えるため STDOUT への出力が推奨。
      # config/environments/production.rb の if ENV["RAILS_LOG_TO_STDOUT"].present?
      # の条件分岐を true にするために必要。
      - key: RAILS_LOG_TO_STDOUT
        value: "true"

      # RAILS_SERVE_STATIC_FILES: Rails が静的ファイルを直接配信する設定
      # 通常は Nginx などのリバースプロキシが CSS・JS・画像を配信するが、
      # Render 無料プランでは Nginx を別途立てないため Rails に直接配信させる。
      # これがないとページの CSS が全く適用されない状態になる。
      # config/environments/production.rb の
      # config.public_file_server.enabled = ENV["RAILS_SERVE_STATIC_FILES"].present?
      # を true にするために必要。
      - key: RAILS_SERVE_STATIC_FILES
        value: "true"
```

