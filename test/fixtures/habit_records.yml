# ==============================================================================
# HabitRecord モデルのテストデータ（Fixtures）
# ==============================================================================
# 【役割】
# - テスト実行時に自動的にデータベースに投入される
# - テストの前提条件として使用される
# 
# 【重要】
# - UNIQUE制約（user_id, habit_id, record_date）があるため、
#   同じユーザー・習慣・日付の組み合わせは作成できない
# - テスト内で新規作成するデータと重複しないように設計
# ==============================================================================

# ------------------------------------------------------------------------------
# one: ユーザー1の習慣1の記録（3日前、完了済み）
# ------------------------------------------------------------------------------
# ※ テスト内で「今日」や「昨日」の記録を作成するため、
#   fixturesでは「3日前」の記録を用意して重複を避ける
# ------------------------------------------------------------------------------
one:
  user: one                                  # users.yml の one を参照
  habit: one                                 # habits.yml の one を参照
  record_date: <%= Date.current - 3.days %>  # 3日前
  completed: true                            # 完了済み

# ------------------------------------------------------------------------------
# two: ユーザー2の習慣2の記録（2日前、完了済み）
# ------------------------------------------------------------------------------
# ※ ユーザー2の習慣2の記録なので、ユーザー1・習慣1とは重複しない
# ------------------------------------------------------------------------------
two:
  user: two                                  # users.yml の two を参照
  habit: two                                 # habits.yml の two を参照
  record_date: <%= Date.current - 2.days %>  # 2日前
  completed: true                            # 完了済み

# ------------------------------------------------------------------------------
# three: ユーザー1の習慣1の記録（4日前、未完了）
# ------------------------------------------------------------------------------
# ※ ユーザー1・習慣1だが、日付が異なるので重複しない
# ------------------------------------------------------------------------------
three:
  user: one                                  # users.yml の one を参照
  habit: one                                 # habits.yml の one を参照
  record_date: <%= Date.current - 4.days %>  # 4日前
  completed: false                           # 未完了
