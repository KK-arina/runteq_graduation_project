# ==============================================================================
# test/fixtures/habit_records.yml
# ==============================================================================
# 【fixtures とは】
#   テスト用のサンプルデータ。テスト実行前に自動でDBに投入される。
#   YAML 形式で記述し、モデル名の複数形がファイル名になる。
#
# 【注意事項】
#   - record_date は過去の日付にすること
#     （UNIQUE 制約で今日の日付が tests 内で競合しないようにするため）
#   - user: one は users.yml の :one エントリを参照する
#   - habit: one は habits.yml の :one エントリを参照する
# ==============================================================================

# ユーザー1の習慣1の昨日の記録（完了済み）
one:
  user: one
  habit: one
  record_date: <%= 2.days.ago.to_date %>
  completed: true

# ユーザー1の習慣1の一昨日の記録（未完了）
two:
  user: one
  habit: one
  record_date: <%= 3.days.ago.to_date %>
  completed: false

# ユーザー2の習慣2の記録
three:
  user: two
  habit: two
  record_date: <%= 2.days.ago.to_date %>
  completed: true
