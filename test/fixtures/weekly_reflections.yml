# test/fixtures/weekly_reflections.yml
# （既存ファイルに current_week / last_week がなければ追記する）

current_week:
  user: one
  week_start_date: <%= Date.current.beginning_of_week(:monday) %>
  week_end_date: <%= Date.current.beginning_of_week(:monday) + 6.days %>
  reflection_comment: '今週の振り返りコメント'
  is_locked: false

last_week:
  user: one
  week_start_date: <%= 1.week.ago.to_date.beginning_of_week(:monday) %>
  week_end_date: <%= 1.week.ago.to_date.beginning_of_week(:monday) + 6.days %>
  reflection_comment: '先週の振り返りコメント'
  is_locked: true