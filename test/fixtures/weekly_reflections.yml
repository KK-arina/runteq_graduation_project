# test/fixtures/weekly_reflections.yml
#
# ============================================================
# 【E-1追加 修正内容】
#   direct_reason / background_situation / next_action が presence: true（必須）
#   になったため、全フィクスチャに3フィールドを追加する。
#
#   フィクスチャは before_validation を通らないため、
#   モデルを経由せず DB に直接挿入される。
#   ただし complete! メソッドが update! を呼ぶとバリデーションが走るため、
#   フィクスチャデータにも3フィールドが必要。
#
# 【week_number の計算方法】
# Date.new(YYYY, MM, DD).cweek で確認できる。
# ============================================================

# ----------------------------------------------------------------
# for_summary_test
# ----------------------------------------------------------------
for_summary_test:
  user: one
  week_start_date: "2026-01-12"
  week_end_date:   "2026-01-18"
  reflection_comment: "テスト振り返り1"
  direct_reason:        "テスト用の直接原因"      # E-1追加: presence必須化対応
  background_situation: "テスト用の改善策"         # E-1追加: presence必須化対応
  next_action:          "テスト用の次への展開"      # E-1追加: presence必須化対応
  completed_at: "2026-01-18 15:00:00"
  year: 2026
  week_number: 3

# ----------------------------------------------------------------
# one_habit_one
# ----------------------------------------------------------------
