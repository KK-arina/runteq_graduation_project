# ----------------------------------------------------------------
# pending_reflection（locked_user 専用・completed_at は nil）
# ----------------------------------------------------------------
pending_reflection:
  user: locked_user
  week_start_date: "2026-02-09"
  week_end_date:   "2026-02-15"
  reflection_comment: "未完了の振り返り"
  direct_reason:        "テスト用の直接原因"      # E-1追加: complete!でバリデーションが走るため必須
  background_situation: "テスト用の改善策"         # E-1追加: 同上
  next_action:          "テスト用の次への展開"      # E-1追加: 同上
  completed_at: ~
  year: 2026
  week_number: 7
