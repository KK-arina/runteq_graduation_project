# test/fixtures/weekly_reflections.yml
#
# ============================================================
# 【Issue #A-7 で修正】
# year と week_number を全 fixture に追加する。
#
# 【修正理由】
# fixtures はモデルの before_validation を経由しないため、
# year/week_number が nil のまま DB に保存される。
# year/week_number が nil だと UNIQUE 制約(user_id, year, week_number)が
# 正しく機能せず、テストで予期しないエラーが発生する。
#
# 【week_number の計算方法】
# Date.new(YYYY, MM, DD).cweek で確認できる。
# 例: Date.new(2026, 1, 5).cweek  => 2
#     Date.new(2026, 1, 12).cweek => 3
#     Date.new(2026, 1, 19).cweek => 4
#     Date.new(2026, 2, 2).cweek  => 6
#     Date.new(2026, 2, 9).cweek  => 7
# ============================================================

