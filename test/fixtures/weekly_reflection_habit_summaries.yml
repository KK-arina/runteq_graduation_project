# test/fixtures/weekly_reflection_habit_summaries.yml
#
# 【参照先の対応関係】
# weekly_reflection: one → 2週前（user: one）
# weekly_reflection: two → 1週前（user: one）
# habit: habit_one       → user: one の習慣（読書）
#
# 【スコープテストのための設計】
# completed スコープ（achievement_rate: 100）→ one_habit_one
# incomplete スコープ（achievement_rate: 100未満）→ two_habit_one

# 2週前 × habit_one（達成率100% → completed スコープテストに使用）
one_habit_one:
  weekly_reflection: one
  habit: habit_one
  habit_name: 読書
  weekly_target: 7
  actual_count: 7
  achievement_rate: 100.00

# 1週前 × habit_one（達成率71% → incomplete スコープテストに使用）
two_habit_one:
  weekly_reflection: two
  habit: habit_one
  habit_name: 読書
  weekly_target: 7
  actual_count: 5
  achievement_rate: 71.00