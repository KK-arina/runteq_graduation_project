# test/fixtures/weekly_reflection_habit_summaries.yml
#
# ==============================================================================
# 【E-2 変更内容】
#   actual_value / unit カラムを追加したため、数値型テスト用フィクスチャを追加する。
#
# 【カラム一覧】
#   habit_name       : 振り返り時点の習慣名（スナップショット）
#   weekly_target    : 振り返り時点の目標値（スナップショット）
#   actual_count     : チェック型の完了日数（数値型では 0）
#   actual_value     : 数値型の週次実績値合計（チェック型では NULL）
#   unit             : 数値型の単位スナップショット（チェック型では NULL）
#   achievement_rate : 達成率（0.00〜100.00）
#
# 【UNIQUE 制約】
#   (weekly_reflection_id, habit_id) の組み合わせが重複するとエラーになる。
#   各フィクスチャで異なる combination を使うこと。
# ==============================================================================

# ---------------------------------------------------------------
# one_habit_one（completedスコープテスト用・変更禁止）
#
# 【役割】
#   completed スコープ（achievement_rate: 100）のテストで参照される。
#   for_summary_test × habit_two を使う理由：
#     モデルテストの setup が「for_summary_test × habit_one」を .new で使うため
#     UNIQUE 制約違反を避けるために habit_two を割り当てている。
# ---------------------------------------------------------------
one_habit_one:
  weekly_reflection: for_summary_test
  habit: habit_two
  habit_name: "筋トレ"
  weekly_target: 3
  actual_count: 3
  # actual_value は NULL（チェック型のため）
  # unit は NULL（チェック型のため）
  achievement_rate: 100.0

# ---------------------------------------------------------------
# two_habit_one（incompleteスコープテスト用・変更禁止）
#
# 【役割】
#   incomplete スコープ（achievement_rate < 100）のテストで参照される。
# ---------------------------------------------------------------
two_habit_one:
  weekly_reflection: completed_one
  habit: habit_one
  habit_name: "読書"
  weekly_target: 7
  actual_count: 5
  # actual_value は NULL（チェック型のため）
  # unit は NULL（チェック型のため）
  achievement_rate: 71.0

# ---------------------------------------------------------------
# summary_one（showページ表示テスト用・変更禁止）
#
# 【役割】
#   show アクションテストで達成済みサマリーが表示されることを確認する。
# ---------------------------------------------------------------
summary_one:
  weekly_reflection: completed_one
  habit: habit_two
  habit_name: "ランニング"
  weekly_target: 3
  actual_count: 3
  # actual_value は NULL（チェック型のため）
  # unit は NULL（チェック型のため）
  achievement_rate: 100.0

# ---------------------------------------------------------------
# summary_two（showページ表示テスト用・変更禁止）
#
# 【役割】
#   show アクションテストで未達成サマリーが表示されることを確認する。
#   habit_deleted（論理削除済み習慣）を参照する理由：
#     completed_one × habit_one, habit_two は上で使用済みのため UNIQUE 制約回避。
#     optional: true なので削除済み習慣を参照しても valid。
# ---------------------------------------------------------------
summary_two:
  weekly_reflection: completed_one
  habit: habit_deleted
  habit_name: "瞑想"
  weekly_target: 5
  actual_count: 2
  # actual_value は NULL（チェック型のため）
  # unit は NULL（チェック型のため）
  achievement_rate: 40.0

# ---------------------------------------------------------------
# numeric_summary_one（E-2 新規追加：数値型テスト用）
#
# 【役割】
#   数値型習慣のサマリーが正しく作成・表示されることをテストするための
#   フィクスチャ。
#   summary_text が「90 / 120 分（75%）」形式で返ることを確認する。
#
# 【なぜ for_summary_test × habit_numeric を使うのか】
#   for_summary_test には habit_two（one_habit_one）しかないため
#   habit_numeric を追加しても UNIQUE 制約に違反しない。
#   habit_numeric は数値型習慣（fixtures/habits.yml で定義）。
# ---------------------------------------------------------------
numeric_summary_one:
  weekly_reflection: for_summary_test
  habit: habit_numeric
  habit_name: "ジョギング"
  weekly_target: 120
  actual_count: 0
  actual_value: 90.00
  unit: "分"
  achievement_rate: 75.0