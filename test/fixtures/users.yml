# test/fixtures/users.yml
# ============================================================
# ユーザーのテスト用固定データ（フィクスチャ）
#
# 【フィクスチャとは？】
# テスト実行前にデータベースへ自動で挿入されるサンプルデータです。
# テストごとに毎回リセットされるので、テスト間でデータが干渉しません。
#
# 【BCrypt::Password.create("password") とは？】
# bcryptライブラリでパスワードをハッシュ化するメソッドです。
# has_secure_password を使っているので、
# password_digest カラムにはハッシュ化済みの文字列が必要です。
# ============================================================

# テスト用ユーザー1（主に操作を行うユーザー）
one:
  name: Test User One
  email: fixture_one@example.com
  # BCrypt::Password.create("password") で "password" をハッシュ化
  # <%= %> はERBタグ。YAMLファイル内でRubyコードを実行できます
  password_digest: <%= BCrypt::Password.create("password") %>

# テスト用ユーザー2（セキュリティテストで「別ユーザー」として使用）
two:
  name: Test User Two
  email: fixture_two@example.com
  password_digest: <%= BCrypt::Password.create("password") %>