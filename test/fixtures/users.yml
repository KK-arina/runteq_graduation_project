# test/fixtures/users.yml
#
# ==============================================================================
# F-3 対応: 既存ユーザー全員に terms_agreed_at を追加
# ==============================================================================
#
# 【なぜ terms_agreed_at を fixture に追加するのか】
#   F-3 で ApplicationController に redirect_to_terms_agreement_if_needed を追加した。
#   このフィルターは「ログイン済みかつ terms_agreed_at が nil」のユーザーを
#   /terms_agreement へ強制リダイレクトする。
#
#   fixture のユーザーは DB 上で terms_agreed_at = NULL になるため、
#   F-3 実装前から存在する全テストが「未同意ユーザー」と判定されてしまい、
#   期待したページではなく /terms_agreement にリダイレクトされてテストが全滅する。
#
#   解決方法: 既存の全 fixture ユーザーに terms_agreed_at を設定する。
#   これにより「同意済みユーザー」として扱われ、既存テストへの影響がなくなる。
#
# 【新規 fixture ユーザーを追加する場合のルール】
#   - 同意済みユーザーとしてテストする場合: terms_agreed_at を設定する
#   - 未同意ユーザーとしてテストする場合: terms_agreed_at を省略（nil になる）
#     ただし、テスト内で /terms_agreement へのリダイレクトを明示的に考慮すること
# ==============================================================================

# fixture_only_user（E-2 新規追加）
#
# 【役割】
#   habit_numeric フィクスチャ専用のユーザー。
#
# 【なぜ専用ユーザーが必要か】
#   users(:one) / users(:two) の habits.active.count を
#   アサートしている既存テスト（habit_deletion_test.rb 等）に
#   影響を与えないため、habit_numeric 専用のユーザーを隔離する。
#   user: one / user: two のどちらに割り当てても既存テストが壊れるため
#   テストで参照されない専用ユーザーを新設する。
#
# 【cost: 1 を使う理由】
#   BCrypt のコストパラメータを下げることでテスト実行を高速化する。
#   本番は cost: 12 以上を推奨するが、テスト用途では cost: 1 で十分。
#   既存フィクスチャと同じ cost: 1 に統一する。
#
# 【first_login_at を設定する理由】
#   first_login_at が NULL のユーザーは ApplicationController の
#   redirect_to_onboarding_if_needed により /onboarding/step5 へ
#   リダイレクトされる（D-7 実装）。
#
# 【F-3 追加: terms_agreed_at を設定する理由】
#   terms_agreed_at が NULL のユーザーは redirect_to_terms_agreement_if_needed
#   により /terms_agreement へリダイレクトされる。
#   テストで意図しないリダイレクトが起きないよう同意済みとして設定する。
fixture_only_user:
  name: "フィクスチャ専用ユーザー"
  email: "fixture_only@example.com"
  password_digest: "<%= BCrypt::Password.create('password', cost: 1) %>"
  first_login_at: "2026-01-01 00:00:00"
  terms_agreed_at: "2026-01-01 00:00:00"

# 【このファイルの役割】
# テスト用のユーザーサンプルデータ。
# Issue #25 では「前週の振り返りが未完了でロック中」のユーザーを追加する。
#
# 【BCryptパスワードについて】
# has_secure_password を使っているため、password_digest に BCrypt ハッシュが必要。
# テスト用の固定ハッシュ（"password" → BCryptハッシュ）を使う。
# これは rails console で BCrypt::Password.create("password") で生成できる。
#
# 【D-7 追加: first_login_at について】
#   first_login_at が NULL のユーザーは ApplicationController の
#   redirect_to_onboarding_if_needed により /onboarding/step5 へリダイレクトされる。
#   既存テストユーザーはオンボーディング完了済みとして扱うため
#   全エントリに first_login_at を設定する。
#
# 【F-3 追加: terms_agreed_at について】
#   terms_agreed_at が NULL のユーザーは redirect_to_terms_agreement_if_needed
#   により /terms_agreement へリダイレクトされる。
#   既存テストユーザーは同意済みとして扱うため全エントリに設定する。

# ---- 既存のフィクスチャ（Week 1 で追加済み） ----
one:
  name: "テストユーザー1"
  email: "test1@example.com"
  # "$2a$12$..." は "password" を BCrypt でハッシュ化した文字列
  password_digest: "<%= BCrypt::Password.create('password', cost: 1) %>"
  # D-7 追加: オンボーディング完了済みとして扱う（NULL だとリダイレクトされる）
  first_login_at: "2026-01-01 00:00:00"
  # F-3 追加: 利用規約同意済みとして扱う（NULL だと /terms_agreement にリダイレクトされる）
  terms_agreed_at: "2026-01-01 00:00:00"

two:
  name: "テストユーザー2"
  email: "test2@example.com"
  password_digest: "<%= BCrypt::Password.create('password', cost: 1) %>"
  # D-7 追加: オンボーディング完了済みとして扱う
  first_login_at: "2026-01-01 00:00:00"
  # F-3 追加: 利用規約同意済みとして扱う
  terms_agreed_at: "2026-01-01 00:00:00"

# ============================================================
# Issue #25 で追加するフィクスチャ
# ============================================================
# locked_user
#   → PDCA強制ロックがかかっているユーザーのテスト用
#   → このユーザーは weekly_reflections.yml の pending_reflection（未完了）に紐づいている
#   → travel_to "2026-02-16 04:01:00"（月曜AM4:01）のとき locked? が true になる
locked_user:
  name: "ロックテストユーザー"
  email: "locked@example.com"
  password_digest: "<%= BCrypt::Password.create('password', cost: 1) %>"
  # D-7 追加: オンボーディング完了済みとして扱う
  first_login_at: "2026-01-01 00:00:00"
  # F-3 追加: 利用規約同意済みとして扱う
  terms_agreed_at: "2026-01-01 00:00:00"