# test/fixtures/habits.yml
# ============================================================
# 習慣のテスト用固定データ（フィクスチャ）
#
# 【user: one とは？】
# users.yml の "one" に定義したユーザーを外部キーとして参照します。
# Railsが自動的に user_id を解決してくれます。
#
# 【deleted_at: （空白）とは？】
# 論理削除フラグ。値なし = null = 有効な習慣（削除されていない）
# ============================================================

# ユーザー1の有効な習慣（テスト主体として使用）
habit_one:
  user: one
  name: 読書
  weekly_target: 7
  deleted_at:   # null = 有効な習慣

# ユーザー2の有効な習慣（セキュリティテストで「他ユーザーの習慣」として使用）
habit_two:
  user: two
  name: 筋トレ
  weekly_target: 5
  deleted_at:   # null = 有効な習慣

# ユーザー1の論理削除済み習慣（削除機能テスト用）
# ============================================================
# Issue #29: 1.day.ago → 固定日付に変更
# ============================================================
# 【変更前の問題】
#   deleted_at: <%= 1.day.ago %>
#   → フィクスチャはサーバー起動時に一度だけ評価されるため、
#     テスト実行日によって値が変わる「不安定なフィクスチャ」になっていた。
#   → 特に月曜日実行時に locked? の判定に干渉するリスクがあった。
#
# 【変更後】
#   固定の過去日付を使うことでテストの再現性を保証する。
#   2026-01-01 は全テストの week_start_date より前の日付のため
#   どのテストとも干渉しない。
habit_deleted:
  user: one
  name: 削除済み習慣
  weekly_target: 3
  deleted_at: "2026-01-01 00:00:00"