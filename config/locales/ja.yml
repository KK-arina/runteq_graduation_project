# config/locales/ja.yml
# （既存内容はそのまま維持し、追記箇所のみ以下に示す）
# ==============================================================================
# D-1 追加: UserPurpose モデルの属性名・エラーメッセージを追加する
# ==============================================================================

ja:
  date:
    formats:
      long: "%Y年%-m月%-d日"
  time:
    formats:
      long: "%Y年%-m月%-d日 %H時%M分"

  activerecord:
    attributes:
      user:
        name: "ユーザー名"
        email: "メールアドレス"
        password: "パスワード"
        password_confirmation: "パスワード（確認）"

      habit:
        name: "習慣名"
        weekly_target: "週次目標"
        measurement_type: "記録タイプ"
        unit: "単位"
        color: "カラー"
        icon: "アイコン"

      task:
        title: "タスク名"
        priority: "優先度"
        task_type: "タスク種別"
        status: "ステータス"
        due_date: "期限日"
        estimated_hours: "見積時間"
        scheduled_at: "実施予定日時"
        alarm_enabled: "アラーム"
        alarm_minutes_before: "アラーム通知時間"
        habit_id: "関連習慣"

      # ── D-1 追加: UserPurpose モデルの属性名日本語化 ────────────
      # 「Purpose を入力してください」→「Purpose（人生で大切にしていること）を入力してください」
      # のように日本語でわかりやすい属性名に変換する。
      user_purpose:
        purpose:           "Purpose（人生で大切にしていること）"
        mission:           "Mission（今最も必要なこと）"
        vision:            "Vision（1年後の自分）"
        value:             "Value（絶対に譲れないこと）"
        current_situation: "Current（今の自分の現状）"
        version:           "バージョン"
        analysis_state:    "分析状態"
      # ──────────────────────────────────────────────────────────

    errors:
      messages:
        record_invalid: "バリデーションに失敗しました: %{errors}"
        restrict_dependent_destroy:
          has_one: "%{record}が存在するので削除できません"
          has_many: "%{record}が存在するので削除できません"
      models:
        user:
          attributes:
            name:
              blank: "を入力してください"
              too_long: "は%{count}文字以内で入力してください"
            email:
              blank: "を入力してください"
              invalid: "の形式が正しくありません"
              taken: "は現在使用できません。別のメールアドレスをお試しください"
              too_long: "は%{count}文字以内で入力してください"
            password:
              blank: "を入力してください"
              too_short: "は%{count}文字以上で入力してください"
            password_confirmation:
              confirmation: "とパスワードの入力が一致しません"
        habit_record:
          attributes:
            record_date:
              blank: "を入力してください"
              taken: "はすでに記録されています"
            completed:
              inclusion: "は一覧にありません"
        weekly_reflection_habit_summary:
          attributes:
            habit_name:
              blank: "を入力してください"
              too_long: "は%{count}文字以内で入力してください"
            weekly_target:
              blank: "を入力してください"
              not_a_number: "は数値で入力してください"
        task:
          attributes:
            title:
              blank: "を入力してください"
              too_long: "は100文字以内で入力してください"
            priority:
              blank: "を入力してください"
              inclusion: "はMust / Should / Couldから選択してください"
            task_type:
              blank: "を入力してください"
              inclusion: "が不正です"

        # ── D-1 追加: UserPurpose モデルのエラーメッセージ ─────────
        user_purpose:
          attributes:
            version:
              blank: "を入力してください"
              not_a_number: "は数値で入力してください"
              greater_than: "は%{count}より大きい値にしてください"
          base:
            at_least_one: "Purpose / Mission / Vision / Value / Current のうち少なくとも1つを入力してください"
        # ──────────────────────────────────────────────────────────

  errors:
    messages:
      taken: "は現在使用できません。別のメールアドレスをお試しください"
      blank: "を入力してください"
      invalid: "の形式が正しくありません"
      too_long: "は%{count}文字以内で入力してください"
      too_short: "は%{count}文字以上で入力してください"
      not_a_number: "は数値で入力してください"
      inclusion: "は一覧にありません"
      confirmation: "と%{attribute}の入力が一致しません"