# config/locales/ja.yml
#
# ==============================================================================
# 日本語ロケールファイル
# ==============================================================================
#
# 【このファイルの役割】
#   Rails アプリケーション全体の「日本語テキスト」を一元管理するファイル。
#   バリデーションエラーメッセージ・フラッシュメッセージ・属性名などを
#   コントローラーやモデルにハードコードせず、ここで定義する。
#
# 【なぜ一元管理するのか】
#   文言を変更したいとき、このファイルだけ修正すれば全ての箇所に反映される。
#   コントローラーやビューに直書きすると、変更漏れが起きやすくなる。
#
# 【YAML の重要なルール】
#   ① 同じキーを2回書くと後の定義が前を上書きする（前の定義は消える）
#      例: ja: > activerecord: が2箇所あると、後の方だけが有効になる
#   ② インデントはスペースのみ（タブ文字は禁止）
#   ③ 同じインデントレベルにあるキーは「兄弟」として扱われる
#
# 【E-1 修正内容】
#   ファイル先頭の activerecord: ブロックと末尾の activerecord: ブロックが
#   重複していたため、末尾に統合した。
#   weekly_reflection: の属性名定義も末尾の attributes: ブロックに追加した。
#
# ==============================================================================

ja:
  # ============================================================
  # D-6 追加: AI コスト上限関連のメッセージ
  # ============================================================
  #
  # 【なぜここに書くのか】
  #   ai_limit: は activerecord: とは別のトップレベルキー。
  #   コントローラーから t("ai_limit.exceeded") のように呼び出す。
  #   モデルの属性名ではないため、activerecord: の外に置く。
  ai_limit:
    exceeded: "今月のAI分析回数の上限に達しました。AIなしで振り返りを完了するか、来月をお待ちください。"
    completed_without_ai: "振り返りを保存しました（AI分析はスキップされました）"
    unlock_without_ai: "振り返りが完了し、PDCAロックが解除されました！（AI分析はスキップされました）🔓"
    monthly_reset_done: "月次AI使用回数リセット完了"

  # ============================================================
  # D-10 追加: AI レート制限（連打防止）関連のメッセージ
  # ============================================================
  ai_throttle:
    too_soon: "分析を受け付けました。少々お待ちください。（1分後に再度お試しください）"
    already_processing: "現在AIが分析中です。分析完了後に再度お試しください。"

  # ============================================================
  # D-11 追加: AI エラーハンドリング関連のメッセージ
  # ============================================================
  ai_error:
    timeout: "分析がタイムアウトしました。しばらくしてから再試行してください。"
    auth: "AIサービスに接続できません。管理者にお問い合わせください。"
    all_providers_failed: "AI API に接続できませんでした。しばらくしてから「再試行する」ボタンを押してください。"
    parse_failed: "AI の応答を解析できませんでした。再試行してください。"
    retrying: "一時的なエラーが発生しました。自動的に再試行します（%{count}/%{max}）"

  # ============================================================
  # D-8 追加: 習慣 AI編集関連のメッセージ
  # ============================================================
  #
  # 【なぜ ja.yml に書くのか】
  #   コントローラーに文字列をハードコードせず ja.yml に一元管理する。
  #   将来の文言変更が1箇所の修正で済む。
  habits:
    ai_edit:
      unauthorized: "この操作はAI提案モーダル経由でのみ実行できます"
    ai_update:
      success: "習慣を更新しました（AI編集）"

    # ============================================================
    # E-3 追加: AI提案モーダル関連のメッセージ
    # ============================================================
    ai_proposals:
      confirmed: "来週の計画を確定しました！習慣%{habit_count}件・タスク%{task_count}件を追加しました🎉"
      confirmed_empty: "来週の計画を確定しました！（提案の選択なし）"
      not_found: "振り返りが見つかりませんでした。"
      analysis_not_found: "AI分析結果が見つかりませんでした。分析完了後に再度お試しください。"
      save_partial_error: "一部の提案の保存に失敗しました"

  # ──────────────────────────────────────────────────────────────
  # 日付・時刻フォーマット
  # ──────────────────────────────────────────────────────────────
  #
  # 【なぜここで定義するのか】
  #   Rails の l() ヘルパー（localize）はこのフォーマットを参照して
  #   日付・時刻を日本語形式で表示する。
  #   例: l(Time.current, format: :long) → "2026年5月10日 10時00分"
  date:
    formats:
      long: "%Y年%-m月%-d日"
  time:
    formats:
      long: "%Y年%-m月%-d日 %H時%M分"

  # ──────────────────────────────────────────────────────────────
  # オンボーディング関連のメッセージ
  # ──────────────────────────────────────────────────────────────
  onboarding:
    completed: "目標を保存しました。AIによる分析を開始しています... 完了後にダッシュボードでお知らせします 🎯"
    skipped: "オンボーディングをスキップしました。PMVV目標はあとから「目標管理」ページで入力できます。"
    already_completed: "オンボーディングは完了済みです。"
    welcome: "ようこそ！まずは目標を設定しましょう。"
    skip_button: "スキップ（後で入力する）"
    complete_button: "✨ 完了してダッシュボードへ"

  # ──────────────────────────────────────────────────────────────
  # エラーメッセージの汎用テンプレート
  # ──────────────────────────────────────────────────────────────
  #
  # 【なぜここで定義するのか】
  #   Rails のバリデーションエラーはデフォルト英語のメッセージを生成する。
  #   ここで日本語の対応表を定義することで、全モデルのエラーが日本語になる。
  #   例: errors.messages.blank → フォームの入力欄が空のときのエラーメッセージ
  errors:
    messages:
      taken:        "は現在使用できません。別のメールアドレスをお試しください"
      blank:        "を入力してください"
      invalid:      "の形式が正しくありません"
      too_long:     "は%{count}文字以内で入力してください"
      too_short:    "は%{count}文字以上で入力してください"
      not_a_number: "は数値で入力してください"
      inclusion:    "は一覧にありません"
      confirmation: "と%{attribute}の入力が一致しません"

  # ==============================================================================
  # ActiveRecord 関連の日本語化（1か所にまとめる）
  # ==============================================================================
  #
  # 【activerecord: キーの役割】
  #   モデルのバリデーションエラーメッセージを日本語にするための定義ブロック。
  #   Rails は activerecord: > models: でモデル名を、
  #   activerecord: > attributes: で属性名（カラム名）を参照する。
  #
  # 【なぜ1か所にまとめるのか】
  #   YAML は同じキーを2回書くと後の定義が前を上書きする。
  #   このファイルの旧バージョンでは activerecord: が先頭と末尾の2箇所にあり、
  #   先頭の weekly_reflection: の定義が末尾の activerecord: に上書きされていた。
  #   E-1 修正でこの問題を解消し、activerecord: を末尾の1か所に統合した。
  #
  # 【バリデーションエラーメッセージの生成ルール】
  #   presence: true のエラーは
  #   「#{attributes.モデル名.属性名}#{errors.messages.blank}」の形式になる。
  #
  #   例: weekly_reflection の reflection_comment が空のとき
  #     → attributes.weekly_reflection.reflection_comment = "振り返りコメント"
  #     → errors.messages.blank = "を入力してください"
  #     → 合わせて「振り返りコメントを入力してください」と表示される
  # ==============================================================================
  activerecord:

    # ──────────────────────────────────────────────────────────
    # モデル名の日本語化
    # ──────────────────────────────────────────────────────────
    #
    # 【models: の役割】
    #   errors.full_messages などでモデル名が表示される場合に
    #   英語のクラス名ではなく日本語名を使うための定義。
    #   例: AiAnalysis → "AI分析結果"
    models:
      ai_analysis:  "AI分析結果"
      user_purpose: "PMVV目標"

    # ──────────────────────────────────────────────────────────
    # 属性名（カラム名）の日本語化
    # ──────────────────────────────────────────────────────────
    #
    # 【attributes: の役割】
    #   バリデーションエラーのメッセージに使われる属性名を日本語にする。
    #   定義がない属性は英語のカラム名がそのまま使われる（例: Reflection comment）。
    #   定義すると日本語名が使われる（例: 振り返りコメント）。
    #
    # 【構造】
    #   attributes:
    #     モデル名（スネークケース）:
    #       属性名（カラム名）: "日本語名"
    attributes:
      # 【追記する理由】
      #   weekly_report_enabled のバリデーションエラーメッセージを日本語で表示するため。
      #   未設定だと "Weekly report enabled is not included in the list" という
      #   英語エラーメッセージが表示されてしまう。
      user_setting:
        weekly_report_enabled: "週次レポートメール通知"

      # ──────────────────────────────────────────────────────
      # User モデルの属性名
      # ──────────────────────────────────────────────────────
      user:
        name:                  "ユーザー名"
        email:                 "メールアドレス"
        password:              "パスワード"
        password_confirmation: "パスワード（確認）"
        terms_agreed:          "利用規約への同意"   # F-3 追加

      # ──────────────────────────────────────────────────────
      # Habit モデルの属性名
      # ──────────────────────────────────────────────────────
      habit:
        name:             "習慣名"
        weekly_target:    "週次目標"
        measurement_type: "記録タイプ"
        unit:             "単位"
        color:            "カラー"
        icon:             "アイコン"

      # ──────────────────────────────────────────────────────
      # Task モデルの属性名
      # ──────────────────────────────────────────────────────
      task:
        title:                "タスク名"
        priority:             "優先度"
        task_type:            "タスク種別"
        status:               "ステータス"
        due_date:             "期限日"
        estimated_hours:      "見積時間"
        scheduled_at:         "実施予定日時"
        alarm_enabled:        "アラーム"
        alarm_minutes_before: "アラーム通知時間"
        habit_id:             "関連習慣"

      # ──────────────────────────────────────────────────────
      # UserPurpose モデルの属性名
      # ──────────────────────────────────────────────────────
      user_purpose:
        purpose:            "Purpose（人生で大切にしていること）"
        mission:            "Mission（今最も必要なこと）"
        vision:             "Vision（1年後の理想の自分）"
        value:              "Value（絶対に譲れないこと）"
        current_situation:  "Current（今の自分の現状）"
        version:            "バージョン"
        analysis_state:     "分析状態"
        is_active:          "有効フラグ"
        last_error_message: "エラーメッセージ"

      # ──────────────────────────────────────────────────────
      # AiAnalysis モデルの属性名
      # ──────────────────────────────────────────────────────
      #
      # 【input_snapshot の日本語名について】
      #   D-9 で追加したバリデーションのエラーメッセージに使われる。
      #   errors.full_messages で「PMVV分析データ に必須キーが...」と表示される。
      ai_analysis:
        input_snapshot:          "PMVV分析データ"
        analysis_type:           "分析タイプ"
        analysis_comment:        "分析コメント"
        root_cause:              "根本原因"
        coaching_message:        "コーチングメッセージ"
        improvement_suggestions: "改善提案"
        actions_json:            "推奨アクション"
        crisis_detected:         "危機検出"
        is_latest:               "最新フラグ"

      # ──────────────────────────────────────────────────────
      # WeeklyReflection モデルの属性名（E-1 追加）
      # ──────────────────────────────────────────────────────
      #
      # 【なぜこの定義が必要なのか】
      #   E-1 で WeeklyReflection モデルに
      #   validates :reflection_comment, presence: true を追加した。
      #
      #   presence: true のバリデーションが失敗すると、Rails は
      #   「#{属性の日本語名}を入力してください」というメッセージを生成する。
      #
      #   この定義がないと:
      #     「Reflection comment を入力してください」（英語のカラム名がそのまま使われる）
      #
      #   この定義があると:
      #     「振り返りコメントを入力してください」（日本語名が使われる）
      #
      # 【各属性を定義する理由】
      #   reflection_comment: 必須バリデーションのエラーメッセージを日本語にするため
      #   mood:               気分スコアのエラーメッセージを日本語にするため（1〜5範囲外など）
      #   direct_reason:      将来バリデーション追加時に備えて定義しておく
      #   background_situation: 同上
      #   next_action:        同上
      weekly_reflection:
        reflection_comment:   "振り返りコメント"
        mood:                 "気分スコア"
        direct_reason:        "なぜ？（直接の原因）"
        background_situation: "どう？（改善策）"
        next_action:          "からの？（次への展開）"

    # ──────────────────────────────────────────────────────────
    # バリデーションエラーメッセージのカスタマイズ
    # ──────────────────────────────────────────────────────────
    #
    # 【errors: > models: の役割】
    #   モデルごと・属性ごとに個別のエラーメッセージを定義できる。
    #   errors: > messages: の汎用テンプレートより優先される。
    #
    # 【なぜモデル別に定義するのか】
    #   汎用テンプレートでは「を入力してください」のように文末だけ変えられるが、
    #   「タスク名を入力してください」のように属性名込みで
    #   全文をカスタマイズしたい場合はここで定義する。
    errors:
      messages:
        record_invalid: "バリデーションに失敗しました: %{errors}"
        restrict_dependent_destroy:
          has_one:  "%{record}が存在するので削除できません"
          has_many: "%{record}が存在するので削除できません"
      models:
        user:
          attributes:
            name:
              blank:    "を入力してください"
              too_long: "は%{count}文字以内で入力してください"
            email:
              blank:    "を入力してください"
              invalid:  "の形式が正しくありません"
              taken:    "は現在使用できません。別のメールアドレスをお試しください"
              too_long: "は%{count}文字以内で入力してください"
            password:
              blank:     "を入力してください"
              too_short: "は%{count}文字以上で入力してください"
            password_confirmation:
              confirmation: "とパスワードの入力が一致しません"
            terms_agreed:
              accepted: "利用規約・プライバシーポリシーへの同意が必要です"
        habit_record:
          attributes:
            record_date:
              blank: "を入力してください"
              taken: "はすでに記録されています"
            completed:
              inclusion: "は一覧にありません"
        weekly_reflection_habit_summary:
          attributes:
            habit_name:
              blank:    "を入力してください"
              too_long: "は%{count}文字以内で入力してください"
            weekly_target:
              blank:        "を入力してください"
              not_a_number: "は数値で入力してください"
        task:
          attributes:
            title:
              blank:    "タスク名を入力してください"
              too_long: "は100文字以内で入力してください"
            priority:
              blank:     "を入力してください"
              inclusion: "はMust / Should / Couldから選択してください"
            task_type:
              blank:     "を入力してください"
              inclusion: "が不正です"
        user_purpose:
          attributes:
            version:
              blank:        "を入力してください"
              not_a_number: "は数値で入力してください"
              greater_than: "は%{count}より大きい値にしてください"
        user_setting:
          attributes:
            ai_analysis_monthly_limit:
              greater_than_or_equal_to: "は%{count}以上の値にしてください"

  # ============================================================
  # F-1 追加: OmniAuth Google ログイン関連のメッセージ
  # F-2 追加: OmniAuth LINE ログイン関連のメッセージを追加
  # ============================================================
  #
  # 【なぜここで定義するのか】
  #   コントローラーに文字列をハードコードせず ja.yml に一元管理する。
  #   t("omniauth.google.success") / t("omniauth.line.success") のように呼び出す。
  #
  # 【omniauth.error について】
  #   Google / LINE 共通のエラーメッセージ。
  #   ログインページの omniauth_error パラメータ存在時に表示する。
  omniauth:
    google:
      success: "Google アカウントでログインしました"
      failure: "Google 認証に失敗しました。もう一度お試しください。"
      login_error: "Googleでのログインにエラーが発生しました。メールアドレスとパスワードでログインしてください。"
    line:
      success: "LINE アカウントでログインしました"
      failure: "LINE 認証に失敗しました。もう一度お試しください。"
      login_error: "LINEでのログインにエラーが発生しました。メールアドレスとパスワードでログインしてください。"
    error:
      login_error: "ソーシャルログインに失敗しました。メールアドレスとパスワードでログインしてください。"

  # ── E-4 追加: 通知ディープリンク関連メッセージ ──────────────────────────
  #
  # 【deep_link セクションの用途】
  #   redirect_to パラメータが安全でない（外部URLなど）と判定された場合の
  #   内部ログ用メッセージ。
  #   %{path} はログ出力時に実際のパスで置き換えられる。
  deep_link:
    invalid_redirect: "不正な redirect_to パラメータを検出しました（外部URL等）: %{path}"

  # ============================================================
  # F-3 追加: 利用規約・プライバシーポリシー同意関連のメッセージ
  # ============================================================
  #
  # 【terms_agreement セクションの用途】
  #   TermsAgreementController で使用するフラッシュメッセージ・エラーメッセージ。
  #   t("terms_agreement.agreed") のように呼び出す。
  terms_agreement:
    agreed: "利用規約・プライバシーポリシーへの同意を確認しました。"
    agreed_and_onboarding: "利用規約・プライバシーポリシーへの同意を確認しました。続いて目標を設定しましょう。"
    not_agreed: "利用規約・プライバシーポリシーへの同意が必要です。チェックボックスをオンにしてください。"

  # ============================================================
  # F-4 追加: パスワードリセット関連のメッセージ
  # ============================================================
  #
  # 【このセクションの用途】
  #   PasswordResetsController で t("password_reset.sent") のように呼び出す。
  #   コントローラーにハードコードせず ja.yml に一元管理する。
  password_reset:
    sent:          "パスワードリセットの手順をメールで送信しました。メールをご確認ください。（届かない場合は迷惑メールフォルダもご確認ください）"
    success:       "パスワードを変更しました。新しいパスワードでログインしてください。"
    token_invalid: "リンクが無効または期限切れです。もう一度パスワードリセットを申請してください。"

  # ============================================================
  # F-6 追加 / G-6 更新: 設定ページ・退会処理関連のメッセージ
  # ============================================================
  #
  # 【G-6 での追加内容】
  #   update_profile:   ユーザー名編集のフィードバックメッセージ
  #   update_timezone:  タイムゾーン更新のフィードバックメッセージ
  #   disconnect_line:  LINE通知連携解除のフィードバックメッセージ
  #
  # 【YAML の重要ルール】
  #   settings: キーは ja: の直下に1つだけ書くこと。
  #   2つ書くと後の定義が前を上書きして前の定義が消える。
  settings:
    destroy:
      success:        "退会が完了しました。ご利用いただきありがとうございました。"
      failure:        "退会処理に失敗しました。しばらく経ってから再度お試しください。"
      confirm_button: "退会を確定する"
    # G-6 追加: プロフィール編集
    update_profile:
      success: "ユーザー名を更新しました ✅"
    # G-6 追加: タイムゾーン設定
    update_timezone:
      success: "タイムゾーンを更新しました ✅"
      failure: "タイムゾーンの更新に失敗しました。"
      invalid: "無効なタイムゾーンが指定されました。"
    # G-6 追加: LINE通知連携解除
    disconnect_line:
      success:          "LINE通知連携を解除しました。"
      failure:          "LINE連携の解除に失敗しました。"
      login_user_error: "LINEログインを使用中のため、連携を解除できません。"

  # ============================================================
  # G-1 追加: LINE 通知関連のメッセージ
  # ============================================================
  #
  # 【このセクションの用途】
  #   LINE 通知設定画面・通知状態表示で使用するメッセージ。
  #   将来 user_settings の設定 UI を作るときに使う。
  line_notification:
    enabled: "LINE通知が有効です"
    disabled: "LINE通知が無効です"
    not_connected: "LINEと連携されていません。LINEログインで連携してください。"
    daily_limit_exceeded: "本日の通知上限（%{limit}通）に達しました"
    line_fallback_to_email: "LINE通知に失敗したため、メールで通知しました"

  # ============================================================
  # G-3 追加: 通知設定ページ関連のメッセージ
  # ============================================================
  #
  # 【このセクションの用途】
  #   UserSettingsController で使用するフラッシュメッセージ。
  #   t("user_settings.notification_settings.update_success") のように呼び出す。
  #
  # 【インデントについて】
  #   ja: の直下（インデント2スペース）に user_settings: を配置する。
  #   helpers: と同じ階層に書くこと（インデントがずれると nil になる）。
  #
  # ==============================================================================
  # 既存の user_settings: セクション全体（G-4 の rest_mode: を追記した完成版）
  # ==============================================================================
  # 【重要】YAML は同じキーを2回書くと後の定義が前を上書きする。
  #         以下のブロックを既存の user_settings: セクションと完全に置き換える。
  #         絶対に user_settings: を2つ書かないこと。

  user_settings:
    notification_settings:
      update_success: "通知設定を保存しました ✅"
      update_failure: "通知設定の保存に失敗しました。入力内容を確認してください。"
    # ── G-4 追加: お休みモード関連メッセージ ──────────────────────────────
    #
    # 【使用箇所】
    #   t("user_settings.rest_mode.started", until_date: ...)
    #   t("user_settings.rest_mode.stopped")
    #   t("user_settings.rest_mode.invalid_date")
    #   t("user_settings.rest_mode.stop_button")
    #   t("user_settings.rest_mode.stop_confirm")
    rest_mode:
      started: "お休みモードを開始しました（〜%{until_date}）😴"
      stopped: "お休みモードを終了しました。お帰りなさい！"
      invalid_date: "終了日を正しく入力してください（今日以降の日付）"
      stop_button: "お休みモードを終了する"
      stop_confirm: "お休みモードを終了しますか？ストリークの維持が解除されます。"

  # ============================================================
  # G-5 追加: CSVエクスポート関連のメッセージ
  # ============================================================
  #
  # 【このセクションの用途】
  #   CsvExportsController と設定ページビューで使用するメッセージ。
  #   t("csv_exports.button.habit_records") のように呼び出す。
  csv_exports:
    button:
      # 各エクスポートボタンの初期ラベル
      habit_records:      "📥 習慣記録をCSV出力"
      tasks:              "📥 タスク履歴をCSV出力"
      weekly_reflections: "📥 週次振り返りをCSV出力"
      # ボタン状態変化時のラベル
      generating: "⏳ 生成中...（完了後メールでお知らせします）"
      error:      "⚠️ エラーが発生しました（クリックで再試行）"
    background:
      # バックグラウンド処理開始時のフラッシュメッセージ（Turboなし環境向け）
      queued: "CSVの生成を開始しました。完了後にメールでお知らせします。"
    download:
      # ダウンロードURLのトークンが無効な場合
      token_invalid: "ダウンロードリンクが無効または期限切れです。再度エクスポートしてください。"
      # ダウンロード時のサーバーエラー
      error: "CSVのダウンロードに失敗しました。再度お試しください。"
    error:
      # エクスポート処理全般のエラー
      general: "CSVの生成中にエラーが発生しました。再度お試しください。"

  # ============================================================
  # F-4 追加: フォームボタンのデフォルトテキスト日本語化
  # ============================================================
  #
  # 【なぜ必要か】
  #   form_with scope: :password_reset で f.submit を使うと、
  #   Railsはデフォルトで "Create Password reset" や "Update Password reset" と
  #   英語でボタンテキストを生成してしまう。
  #   helpers.submit に定義することで日本語テキストに上書きできる。
  helpers:
    submit:
      password_reset:
        create: "リセットメールを送信する"
        update: "パスワードを変更する"