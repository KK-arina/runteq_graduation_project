# config/locales/ja.yml
# （既存の内容はそのまま維持し、以下を追記する）
#
# 【date と time の :long フォーマットを追加する理由】
#   メールビュー内で l @scheduled_at_local, format: :long と書いているが、
#   :long フォーマットが未定義だと ActionView::Template::Error が発生する。
#   日本語ユーザーにとって読みやすい形式（2026年1月1日 14時00分）で表示するために定義する。
ja:
  date:
    formats:
      long: "%Y年%-m月%-d日"
  time:
    formats:
      long: "%Y年%-m月%-d日 %H時%M分"

  # ============================================================
  # ActiveRecord 共通メッセージ
  # ============================================================
  activerecord:
    # ============================================================
    # 属性名の日本語化
    # ============================================================
    # Rails はエラーメッセージを「属性名 + メッセージ」で組み立てる。
    # ここで定義することで英語の属性名が日本語になる。
    # 例: "Name を入力してください" → "習慣名を入力してください"
    # ============================================================
    attributes:
      user:
        name: "ユーザー名"
        email: "メールアドレス"
        password: "パスワード"
        password_confirmation: "パスワード（確認）"

      # ── C-1 追加: Habit モデルの属性名日本語化 ─────────────────
      # 「Name を入力してください」→「習慣名を入力してください」
      # 「Weekly target を入力してください」→「週次目標を入力してください」
      habit:
        name: "習慣名"
        weekly_target: "週次目標"
        measurement_type: "記録タイプ"
        unit: "単位"
        color: "カラー"
        icon: "アイコン"
      # ──────────────────────────────────────────────────────────

      # ── C-1 追加: Task モデルの属性名日本語化 ──────────────────
      # Rails はエラーメッセージを「属性名 + メッセージ」で組み立てる。
      # ここで定義することで「Title を入力してください」→「タスク名を入力してください」になる。
      # full_messages では「%{attribute}%{message}」の形式で連結される。
      # 例: title → "タスク名" + "を入力してください" → "タスク名を入力してください"
      task:
        title: "タスク名"
        priority: "優先度"
        task_type: "タスク種別"
        status: "ステータス"
        due_date: "期限日"
        estimated_hours: "見積時間"
        scheduled_at: "実施予定日時"
        alarm_enabled: "アラーム"
        alarm_minutes_before: "アラーム通知時間"
        habit_id: "関連習慣"
      # ──────────────────────────────────────────────────────────

    errors:
      messages:
        record_invalid: "バリデーションに失敗しました: %{errors}"
        restrict_dependent_destroy:
          has_one: "%{record}が存在するので削除できません"
          has_many: "%{record}が存在するので削除できません"
      models:
        user:
          attributes:
            name:
              blank: "を入力してください"
              too_long: "は%{count}文字以内で入力してください"
            email:
              blank: "を入力してください"
              invalid: "の形式が正しくありません"
              taken: "は現在使用できません。別のメールアドレスをお試しください"
              too_long: "は%{count}文字以内で入力してください"
            password:
              blank: "を入力してください"
              too_short: "は%{count}文字以上で入力してください"
            password_confirmation:
              confirmation: "とパスワードの入力が一致しません"
        habit_record:
          attributes:
            record_date:
              blank: "を入力してください"
              taken: "はすでに記録されています"
            completed:
              inclusion: "は一覧にありません"
        weekly_reflection_habit_summary:
          attributes:
            habit_name:
              blank: "を入力してください"
              too_long: "は%{count}文字以内で入力してください"
            weekly_target:
              blank: "を入力してください"
              not_a_number: "は数値で入力してください"
        # ── C-1 追加: Task モデルのエラーメッセージ ────────────────
        task:
          attributes:
            title:
              blank: "を入力してください"
              too_long: "は100文字以内で入力してください"
            priority:
              blank: "を入力してください"
              inclusion: "はMust / Should / Couldから選択してください"
            task_type:
              blank: "を入力してください"
              inclusion: "が不正です"
        # ──────────────────────────────────────────────────────────

  # ============================================================
  # グローバルスコープのエラーメッセージ
  # ============================================================
  errors:
    messages:
      taken: "は現在使用できません。別のメールアドレスをお試しください"
      blank: "を入力してください"
      invalid: "の形式が正しくありません"
      too_long: "は%{count}文字以内で入力してください"
      too_short: "は%{count}文字以上で入力してください"
      not_a_number: "は数値で入力してください"
      inclusion: "は一覧にありません"
      confirmation: "と%{attribute}の入力が一致しません"