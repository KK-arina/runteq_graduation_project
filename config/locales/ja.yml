ja:
  # ============================================================
  # ActiveRecord 共通メッセージ
  # ============================================================
  # save! や create! が失敗したときに表示されるメッセージ。
  # record_invalid → バリデーションエラーで保存失敗時に使われる。
  # ============================================================
  activerecord:
    # ============================================================
    # 属性名の日本語化
    # ============================================================
    # Rails はエラーメッセージを「属性名 + メッセージ」で組み立てる。
    # ここで属性名を日本語化することで
    # 「Password は〜」→「パスワードは〜」になる。
    # ============================================================
    attributes:
      user:
        name: "ユーザー名"
        email: "メールアドレス"
        password: "パスワード"
        password_confirmation: "パスワード（確認）"
    errors:
      messages:
        record_invalid: "バリデーションに失敗しました: %{errors}"
        restrict_dependent_destroy:
          has_one: "%{record}が存在するので削除できません"
          has_many: "%{record}が存在するので削除できません"
      # ============================================================
      # モデル別のエラーメッセージ
      # ============================================================
      # 属性名は activerecord.attributes で日本語化済みのため
      # メッセージは「は〜」「を〜」の形式で書く。
      # Rails が「属性名 + メッセージ」を自動連結するため
      # 「パスワード」+「は8文字以上で入力してください」
      # →「パスワードは8文字以上で入力してください」となる。
      # ============================================================
      models:
        user:
          attributes:
            name:
              blank: "を入力してください"
              too_long: "は%{count}文字以内で入力してください"
            email:
              blank: "を入力してください"
              invalid: "の形式が正しくありません"
              taken: "は現在使用できません。別のメールアドレスをお試しください"
              too_long: "は%{count}文字以内で入力してください"
            password:
              blank: "を入力してください"
              too_short: "は%{count}文字以上で入力してください"
            password_confirmation:
              # ──────────────────────────────────────────────────
              # confirmation バリデーションのメッセージ
              # 「パスワード（確認）」+「とパスワードの入力が一致しません」
              # →「パスワード（確認）とパスワードの入力が一致しません」
              # ──────────────────────────────────────────────────
              confirmation: "とパスワードの入力が一致しません"
        habit_record:
          attributes:
            record_date:
              blank: "を入力してください"
              taken: "はすでに記録されています"
            completed:
              inclusion: "は一覧にありません"
        weekly_reflection_habit_summary:
          attributes:
            habit_name:
              blank: "を入力してください"
              too_long: "は%{count}文字以内で入力してください"
            weekly_target:
              blank: "を入力してください"
              not_a_number: "は数値で入力してください"

  # ============================================================
  # グローバルスコープのエラーメッセージ
  # ============================================================
  # Rails の uniqueness バリデーションは activerecord スコープより
  # 先に errors.messages を参照する場合がある。
  # 本番環境で英語メッセージが表示される問題を防ぐため
  # グローバルスコープにも定義する。
  # ============================================================
  errors:
    messages:
      taken: "は現在使用できません。別のメールアドレスをお試しください"
      blank: "を入力してください"
      invalid: "の形式が正しくありません"
      too_long: "は%{count}文字以内で入力してください"
      too_short: "は%{count}文字以上で入力してください"
      not_a_number: "は数値で入力してください"
      inclusion: "は一覧にありません"
      confirmation: "と%{attribute}の入力が一致しません"