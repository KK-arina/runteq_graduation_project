# config/locales/ja.yml
ja:
  # ============================================================
  # ActiveRecord 共通メッセージ
  # ============================================================
  activerecord:
    # ============================================================
    # 属性名の日本語化
    # ============================================================
    attributes:
      user:
        name: "ユーザー名"
        email: "メールアドレス"
        password: "パスワード"
        password_confirmation: "パスワード（確認）"
      # ── C-1 追加: Task モデルの属性名日本語化 ──────────────────
      # Rails はエラーメッセージを「属性名 + メッセージ」で組み立てる。
      # ここで定義することで「Title を入力してください」→「タスク名を入力してください」になる。
      # full_messages では「%{attribute}%{message}」の形式で連結される。
      # 例: title → "タスク名" + "を入力してください" → "タスク名を入力してください"
      task:
        title: "タスク名"
        priority: "優先度"
        task_type: "タスク種別"
        status: "ステータス"
        due_date: "期限日"
        estimated_hours: "見積時間"
        scheduled_at: "実施予定日時"
        alarm_enabled: "アラーム"
        alarm_minutes_before: "アラーム通知時間"
        habit_id: "関連習慣"
      # ──────────────────────────────────────────────────────────
    errors:
      messages:
        record_invalid: "バリデーションに失敗しました: %{errors}"
        restrict_dependent_destroy:
          has_one: "%{record}が存在するので削除できません"
          has_many: "%{record}が存在するので削除できません"
      models:
        user:
          attributes:
            name:
              blank: "を入力してください"
              too_long: "は%{count}文字以内で入力してください"
            email:
              blank: "を入力してください"
              invalid: "の形式が正しくありません"
              taken: "は現在使用できません。別のメールアドレスをお試しください"
              too_long: "は%{count}文字以内で入力してください"
            password:
              blank: "を入力してください"
              too_short: "は%{count}文字以上で入力してください"
            password_confirmation:
              confirmation: "とパスワードの入力が一致しません"
        habit_record:
          attributes:
            record_date:
              blank: "を入力してください"
              taken: "はすでに記録されています"
            completed:
              inclusion: "は一覧にありません"
        weekly_reflection_habit_summary:
          attributes:
            habit_name:
              blank: "を入力してください"
              too_long: "は%{count}文字以内で入力してください"
            weekly_target:
              blank: "を入力してください"
              not_a_number: "は数値で入力してください"
        # ── C-1 追加: Task モデルのエラーメッセージ ────────────────
        # 属性名は activerecord.attributes.task で日本語化済み。
        # モデルのバリデーションで message: を直接指定している場合は
        # そちらが優先されるが、指定なしの場合はここが使われる。
        # estimated_hours の greater_than は Rails デフォルトメッセージを使うため
        # ここでは定義不要（モデル側で message: を指定済み）。
        task:
          attributes:
            title:
              blank: "を入力してください"
              too_long: "は100文字以内で入力してください"
            priority:
              blank: "を入力してください"
              inclusion: "はMust / Should / Couldから選択してください"
            task_type:
              blank: "を入力してください"
              inclusion: "が不正です"
        # ──────────────────────────────────────────────────────────

  # ============================================================
  # グローバルスコープのエラーメッセージ
  # ============================================================
  errors:
    messages:
      taken: "は現在使用できません。別のメールアドレスをお試しください"
      blank: "を入力してください"
      invalid: "の形式が正しくありません"
      too_long: "は%{count}文字以内で入力してください"
      too_short: "は%{count}文字以上で入力してください"
      not_a_number: "は数値で入力してください"
      inclusion: "は一覧にありません"
      confirmation: "と%{attribute}の入力が一致しません"