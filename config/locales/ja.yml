ja:
  # ============================================================
  # グローバルスコープのエラーメッセージ
  # ============================================================
  # Rails の uniqueness バリデーションは activerecord スコープより
  # 先に errors.messages を参照する場合がある。
  # 本番環境で "Email has already been taken" が表示される問題を
  # 防ぐため、グローバルスコープにも taken を定義する。
  errors:
    messages:
      taken: "は現在使用できません。別のメールアドレスをお試しください"

  # ============================================================
  # ActiveRecord モデル別のエラーメッセージ
  # ============================================================
  # モデル・属性ごとに細かくメッセージを設定できる。
  # グローバルスコープより優先して参照される。
  activerecord:
    errors:
      models:
        user:
          attributes:
            name:
              blank: "を入力してください"
              too_long: "は%{count}文字以内で入力してください"
            email:
              blank: "を入力してください"
              invalid: "の形式が正しくありません"
              taken: "は現在使用できません。別のメールアドレスをお試しください"
              too_long: "は%{count}文字以内で入力してください"
            password:
              blank: "を入力してください"
              too_short: "は%{count}文字以上で入力してください"
        habit_record:
          attributes:
            record_date:
              blank: "を入力してください"
              taken: "はすでに記録されています"
            completed:
              inclusion: "は一覧にありません"
        weekly_reflection_habit_summary:
          attributes:
            habit_name:
              blank: "を入力してください"
              too_long: "は%{count}文字以内で入力してください"
            weekly_target:
              blank: "を入力してください"
              not_a_number: "は数値で入力してください"
