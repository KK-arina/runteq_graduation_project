# config/cable.yml
#
# ==============================================================================
# Action Cable アダプター設定
# ==============================================================================
#
# 【D-3 修正】
#   development の adapter を async → solid_cable に変更する。
#
# 【solid_cable アダプターの利点】
#   PostgreSQL の DB をブローカーとして使う。
#   プロセスをまたいでも通知が届くため
#   GoodJob → broadcast → Turbo Stream → ブラウザ の連携が確実に動く。
#   Redis 不要で既存の PostgreSQL をそのまま使える。
# ==============================================================================

development:
  adapter: solid_cable
  connects_to:
    database:
      writing: cable
  polling_interval: 0.1.seconds
  message_retention: 1.day

test:
  adapter: test

production:
  adapter: solid_cable
  connects_to:
    database:
      writing: cable
  polling_interval: 0.1.seconds
  message_retention: 1.day
