# ==============================================================================
# config/database.yml
# ==============================================================================
#
# 【このファイルの役割】
# Rails がどのデータベースに接続するかを環境ごとに定義するファイル。
# データベースの種類・接続先・コネクション数などを設定する。
#
# 【重要: DATABASE_URL 環境変数が最優先される】
# database.yml に設定が書いてあっても、
# DATABASE_URL 環境変数が設定されている場合はそちらが優先される。
# Render 本番環境では DATABASE_URL（Neon接続文字列）を
# 環境変数として設定するため、本番では database.yml の設定は補助的なもの。
#
# 【接続文字列の形式（Neon の場合）】
# postgresql://[user]:[password]@[host]/[dbname]?sslmode=require
# ==============================================================================

# ==============================================================================
# デフォルト設定（全環境共通）
# ==============================================================================
default: &default
  # adapter: 使用するデータベースの種類
  # postgresql = PostgreSQL（本番・開発・テスト全環境で統一）
  # 開発・本番で同じ DB を使うことで「開発環境では動いたのに本番で動かない」
  # という問題を防げる（SQLite と PostgreSQL では構文が一部異なるため）
  adapter: postgresql

  # encoding: 文字エンコーディング
  # unicode = UTF-8（日本語対応のため必須）
  encoding: unicode

  # pool: DB コネクションプールのサイズ（同時接続数の上限）
  # RAILS_MAX_THREADS と同じ値にする必要がある。
  # 理由: Puma の各スレッドが 1 つの DB コネクションを使用するため、
  #       スレッド数 > pool 数になると「コネクション待ち」が発生しタイムアウトする。
  # ENV.fetch("RAILS_MAX_THREADS", 3) の意味:
  #   RAILS_MAX_THREADS 環境変数が設定されていればその値を使い、
  #   設定されていなければデフォルトの 3 を使う（開発環境向け）。
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

  # url: DATABASE_URL 環境変数から接続文字列を取得する
  # 環境変数が設定されている場合、この設定が adapter・database 等を上書きする。
  # Docker 開発環境・Render 本番環境いずれも DATABASE_URL を設定するため、
  # この1行で全環境の接続先を一元管理できる。
  url: <%= ENV['DATABASE_URL'] %>

# ==============================================================================
# 開発環境
# ==============================================================================
development:
  # &default で定義した共通設定を引き継ぐ（YAML のアンカー機能）
  <<: *default

  # database: DATABASE_URL が設定されていない場合に使用するデータベース名
  # Docker 環境では DATABASE_URL が docker-compose.yml で設定されているため
  # この値は実際には使われない（url: が優先されるため）。
  # Docker を使わずにローカル直接実行する場合のフォールバック用。
  database: habitflow_development

# ==============================================================================
# テスト環境
# ==============================================================================
test:
  <<: *default
  # テスト専用のデータベース。
  # テスト実行のたびにデータがリセットされるため、開発用と分離する。
  # DATABASE_URL が設定されている場合は URL が優先されるが、
  # テスト環境では通常 DATABASE_URL を設定せず、database 名だけで接続する。
  database: habitflow_test

# ==============================================================================
# 本番環境（Render + Neon PostgreSQL）
# ==============================================================================
production:
  <<: *default

  # 本番環境では DATABASE_URL 環境変数（Neon の接続文字列）が必ず設定される。
  # url: <%= ENV['DATABASE_URL'] %> が &default に含まれているため、
  # ここに追加設定は不要。DATABASE_URL の値が自動的に使用される。
  #
  # 【Neon の接続文字列に含まれる設定】
  # Neon の接続文字列（postgresql://user:pass@host/db?sslmode=require）には
  # sslmode=require が含まれており、SSL 接続が強制される。
  # これにより通信が暗号化され、パスワードやデータが平文で流れることを防げる。
  #
  # 【pool の上書き（本番環境用に最適化）】
  # Render 無料プランは RAM 512MB のため、コネクション数を抑える必要がある。
  # Worker 2 × Thread 3 = 最大 6 コネクションが必要なため pool: 5 で十分。
  # Neon 無料プランのコネクション上限（通常10接続）も考慮している。
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>