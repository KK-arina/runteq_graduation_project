# config/database.yml
#
# ==============================================================================
# データベース接続設定
# ==============================================================================
#
# 【D-3 修正】
#   solid_cable が使う cable: 接続を各環境に追加する。
#
# 【なぜ cable: 接続が必要か】
#   solid_cable は cable.yml の connects_to: database: writing: cable で
#   指定した接続名（cable）を使って DB にアクセスする。
#   database.yml に cable: が定義されていないと
#   "database configuration does not specify adapter" エラーが発生する。
#
# 【primary と cable で同じ DB を使う理由】
#   solid_cable 専用の DB を別途用意する必要はない。
#   同じ PostgreSQL の DB 内に solid_cable_messages テーブルが作られる。
#   migrations_paths: db/cable_migrate で
#   solid_cable のマイグレーションを通常のマイグレーションと分けて管理する。
# ==============================================================================

default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  url: <%= ENV['DATABASE_URL'] %>

development:
  # primary: 通常のアプリデータ用接続
  primary:
    <<: *default
    database: habitflow_development
  # cable: solid_cable 用接続（D-3 追加）
  # primary と同じ DB・同じ URL を使う。
  cable:
    <<: *default
    database: habitflow_development
    migrations_paths: db/cable_migrate

test:
  # primary: テスト用接続
  primary:
    <<: *default
    database: habitflow_test
  # cable: テスト環境でも cable 接続を定義する（D-3 追加）
  cable:
    <<: *default
    database: habitflow_test
    migrations_paths: db/cable_migrate

production:
  # primary: 本番用接続（DATABASE_URL が url: に入るため database: 指定不要）
  primary:
    <<: *default
  # cable: 本番 solid_cable 用接続（D-3 追加）
  cable:
    <<: *default
    migrations_paths: db/cable_migrate