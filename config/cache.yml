# config/cache.yml
#
# ==============================================================================
# Issue #I-6: Solid Cache の設定ファイル
# ==============================================================================
#
# 【このファイルの役割】
#   Solid Cache（solid_cache gem）の動作設定を定義する。
#   gem が起動時に自動で読み込むため、Rails 側から require する必要はない。
#   （読み込み先は config/cache.yml → config/solid_cache.yml の順）
#
# 【❗最重要: database: を「書かない」こと】
#   Solid Cache 公式README には次の記述がある:
#     "If none of these are set, Solid Cache will use the ActiveRecord::Base
#      connection pool."
#   = database / databases / connects_to のいずれも書かなければ、
#     Solid Cache は「アプリ本体と同じコネクションプール（primary）」を使う。
#
#   HabitFlow が「あえて別DB接続を作らない」理由は3つある:
#
#     ① Neon 無料プランのコネクション上限を守るため
#        現在の内訳（production.rb のコメント参照）:
#          Puma Worker(2) × Thread(3) = 6 コネクション
#          GoodJob 2スレッド           = 2 コネクション
#          合計 8 コネクション
#        ここに cache: 接続を足すと 3つ目のコネクションプールが生まれ、
#        Worker ごとにさらに接続が増えて上限を超えるリスクがある。
#        primary のプールを共有すれば接続数は 1本も増えない。
#
#     ② db:migrate:status の "NO FILE" 表示を増やさないため
#        #I-1 で棚卸しした通り、db:migrate:status は
#        「database.yml の接続ごとに1ブロック」出力する。
#        現在は primary と cable の 2 ブロック。cache: を足すと 3 ブロックになり、
#        NO FILE の見え方がさらに複雑になる（実害はないが誤解を生む）。
#
#     ③ Render の起動コマンドをそのまま使えるため
#        render.yaml の startCommand は
#          bundle exec rails db:migrate && exec bundle exec puma -C config/puma.rb
#        となっており、起動のたびに db:migrate が走る。
#        solid_cache_entries を通常の db/migrate 配下のマイグレーションで作れば、
#        デプロイ時に自動で適用される（render.yaml の変更が一切不要）。
#
# 【トレードオフ（公式READMEの注意書き）】
#   primary プールを共有すると
#   "cache reads and writes will be part of any wrapping database transaction"
#   = キャッシュの読み書きが、それを囲むトランザクションの一部になる。
#   HabitFlow ではキャッシュ操作を
#     ・コントローラー（トランザクションの外）
#     ・after_commit（コミット完了後 = トランザクションの外）
#   でのみ行うため、この制約は影響しない。
#   むしろ「ロールバックされた処理のキャッシュだけが残る」事故を防げる利点になる。
#   （#A-7「トランザクション内はDBアクセスのみ」の方針とも矛盾しない）
# ==============================================================================

# default: &default
#   YAML の「アンカー」。この定義に &default という名札を付けておき、
#   下の各環境で <<: *default と書いて中身を丸ごと取り込む（DRY 化）。
default: &default
  store_options:
    # ------------------------------------------------------------
    # max_age: キャッシュエントリを保持する最大期間（秒）
    # ------------------------------------------------------------
    # 【7日にする理由】
    #   gem の既定値は 2.weeks。HabitFlow のキャッシュは
    #     ・ダッシュボードの週次集計（expires_in: 1時間）
    #     ・グラフの集計データ（expires_in: 6時間）
    #     ・18番のHTML断片（分析レコードごとに1件・再分析で新IDになり読まれなくなる）
    #   と、いずれも短命なため 2週間も保持する必要がない。
    #   短くすることで Neon 無料プランのストレージ（0.5GB）を節約できる。
    #
    # 【expires_in との違い（混同しやすいので明記）】
    #   expires_in（Rails.cache.fetch に渡す） → 「この値はもう古い」という論理的な有効期限。
    #                                            キャッシュエントリの中身に埋め込まれる。
    #   max_age（ここ）                        → 「行を物理的に削除する」掃除の基準。
    #                                            Solid Cache が FIFO で古い行を消すために使う。
    #   両者は独立しており、max_age を短くしても expires_in の判定は狂わない。
    max_age: <%= 7.days.to_i %>

    # ------------------------------------------------------------
    # max_entries: キャッシュに保持する最大エントリ「件数」
    # ------------------------------------------------------------
    # 【❗なぜ max_size（容量ベース）ではなく max_entries（件数ベース）なのか】
    #   Solid Cache には上限の設け方が2種類ある。
    #
    #     max_size（容量ベース）:
    #       各行の byte_size 列を size_estimate_samples（既定1,000件）分
    #       サンプリングして平均を取り、件数と掛けて総容量を「推定」する。
    #       ・PostgreSQL の実ディスク使用量は TOAST 圧縮やインデックスの影響で
    #         この推定値とズレる（＝上限が正確に効かない）
    #       ・掃除の判定が走るたびに 1,000件のサンプリングクエリが発生する。
    #         Neon 無料プランでは、この余計なクエリコストが無視できない。
    #
    #     max_entries（件数ベース）← これを採用:
    #       MAX(id) - MIN(id) の集計2本だけで件数を推定する。
    #       ・クエリが軽い（インデックスの端を見るだけ）
    #       ・「何件まで」という上限が直感的で、推定誤差の考え方もシンプル
    #
    # 【10,000 という数字の根拠】
    #   HabitFlow が作るキャッシュの内訳（1ユーザーあたり）:
    #     ・ダッシュボード集計 … 1週間に1件
    #     ・グラフ集計         … 1日あたり最大3件（4w / 12w / all）
    #     ・18番のHTML断片     … AI分析1回につき1件
    #   → 1ユーザーが1週間で作るのはおよそ 25 件。
    #   max_age（7日）を過ぎた行は消えるため、常時保持されるのは
    #   「アクティブユーザー数 × 約25件」に収まる。
    #   10,000 件あればユーザー 400 人規模まで余裕があり、
    #   1件あたり数KBとしても総容量は 50MB 程度。
    #   Neon 無料の 0.5GB を圧迫することはない。
    #
    # 【上限を超えたらどうなるか】
    #   Solid Cache が書き込みのたびに内部カウンターを進め、
    #   一定回数ごとにバックグラウンドスレッドで古い行（FIFO）から削除する。
    #   cron も Solid Queue も不要で自動的に掃除される。
    max_entries: 10_000

    # ------------------------------------------------------------
    # namespace: キャッシュキーの先頭に付ける文字列
    # ------------------------------------------------------------
    # 【なぜ Rails.env を使うのか】
    #   development と test は database.yml 上は別DBだが、
    #   将来 同じDBを共有するような場面（現在の cable 接続と同じ状況）でも
    #   環境ごとにキーが分離されて混ざらない。
    #   実際のキーは "development:dashboard_habit_stats:1:2026-07-13" のようになる。
    namespace: <%= Rails.env %>

# development / test / production の3環境とも同じ設定を使う。
# 【なぜ環境で分けないのか】
#   「開発と本番の動作差異をなくす」という HabitFlow の方針
#   （config/application.rb の GoodJob 設定コメント参照）に従う。
#   実際にどのストアを使うかは config/environments/*.rb の cache_store で制御する。
development:
  <<: *default

test:
  <<: *default

production:
  <<: *default